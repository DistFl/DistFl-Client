# DistFL Client Configuration
# ─────────────────────────────────────────────────────────
# All fields are optional — CLI flags and programmatic args override these.

# Server connection
server_url: "ws://localhost:8080"
room_id: ""                          # Leave empty to create a new room
client_id: ""                        # Auto-generated if omitted

# Dataset
data_path: "./data.csv"
label_column: "label"                # Target column name in CSV

# Training hyperparameters
batch_size: 32
local_epochs: 2
learning_rate: 0.001

# State persistence
db_path: "fl_client_state.db"        # SQLite database for crash recovery

# Networking
reconnect_max_delay: 60.0            # Max backoff delay (seconds)
reconnect_base_delay: 1.0            # Initial reconnect delay (seconds)
heartbeat_interval: 30.0             # WebSocket ping interval (seconds)

# Dashboard
dashboard_port: 5050                 # Real-time metrics UI (0 = disabled)

# Logging
log_level: "INFO"                    # DEBUG, INFO, WARNING, ERROR
